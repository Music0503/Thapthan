<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 เกมจับคู่เทคโนโลยี - บทที่ 2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Game Wrapper */
        .game-wrapper {
            max-width: 750px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }

        /* Start Screen */
        .start-screen {
            text-align: center;
            padding: 60px 30px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
        }

        .start-screen h1 {
            color: #fff;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .start-screen .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .start-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .start-info-item {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }

        .start-info-item span {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
            color: #00f2fe;
        }

        .start-btn {
            background: linear-gradient(135deg, #f4c430, #ff9800);
            border: none;
            color: #1a1a1a;
            padding: 18px 60px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 800;
            font-family: 'Sarabun', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(244, 196, 48, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 30px rgba(244, 196, 48, 0.6);
        }

        /* HUD */
        .game-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .hud-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 10px 18px;
            color: #fff;
            text-align: center;
            flex: 1;
        }

        .hud-label {
            font-size: 0.75rem;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hud-value {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .hud-value.moves-val {
            color: #4facfe;
        }

        .hud-value.pairs-val {
            color: #28a745;
        }

        .hud-value.timer-val {
            color: #ff6b6b;
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .memory-card {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            border-radius: 14px;
        }

        .memory-card.flipped {
            transform: rotateY(180deg);
        }

        .memory-card.matched {
            animation: matchPulse 0.6s ease;
        }

        .memory-card.matched .card-front {
            border-color: #28a745;
            background: rgba(40, 167, 69, 0.2);
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.4);
        }

        @keyframes matchPulse {
            0% {
                transform: rotateY(180deg) scale(1);
            }

            50% {
                transform: rotateY(180deg) scale(1.1);
            }

            100% {
                transform: rotateY(180deg) scale(1);
            }
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-back {
            background: linear-gradient(135deg, #302b63, #24243e);
            border: 2px solid rgba(79, 172, 254, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .card-back-icon {
            font-size: 2.5rem;
        }

        .card-back-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .card-front {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            transform: rotateY(180deg);
            backdrop-filter: blur(10px);
        }

        .card-emoji {
            font-size: 2.5rem;
        }

        .card-label {
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 6px;
            text-align: center;
            line-height: 1.2;
        }

        /* Result Screen */
        .result-screen {
            text-align: center;
            padding: 50px 30px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            display: none;
            animation: slideIn 0.5s ease;
        }

        .result-screen.show {
            display: block;
        }

        .result-emoji {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .result-title {
            color: #fff;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .result-score {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #4facfe, #f4c430);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .result-detail {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 15px 20px;
            min-width: 100px;
        }

        .stat-box .stat-num {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
        }

        .stat-box .stat-lbl {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .stat-box.blue .stat-num {
            color: #4facfe;
        }

        .stat-box.green .stat-num {
            color: #28a745;
        }

        .stat-box.yellow .stat-num {
            color: #f4c430;
        }

        .result-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .result-actions .btn {
            font-size: 1rem;
        }

        /* Streak popup */
        .streak-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 2.5rem;
            font-weight: 800;
            color: #f4c430;
            text-shadow: 0 0 30px rgba(244, 196, 48, 0.5);
            z-index: 100;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .streak-popup.show {
            transform: translate(-50%, -50%) scale(1);
            animation: streakAnim 1s ease forwards;
        }

        @keyframes streakAnim {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }

            30% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 1;
            }

            70% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -70%) scale(0.8);
                opacity: 0;
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes confetti {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }

        /* Particles */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 200;
        }

        /* Timer warning */
        .timer-warning {
            animation: pulse 0.5s ease infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Difficulty Buttons */
        .difficulty-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .diff-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Sarabun', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .diff-btn:hover {
            background: rgba(79, 172, 254, 0.2);
            border-color: #4facfe;
        }

        .diff-btn.active {
            background: rgba(79, 172, 254, 0.3);
            border-color: #4facfe;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .game-wrapper {
                margin-top: 90px;
            }

            .start-screen h1 {
                font-size: 1.6rem;
            }

            .card-grid {
                gap: 8px;
            }

            .card-emoji {
                font-size: 1.8rem;
            }

            .card-label {
                font-size: 0.6rem;
            }

            .card-back-icon {
                font-size: 1.8rem;
            }

            .hud-value {
                font-size: 1.2rem;
            }

            .result-score {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 400px) {
            .card-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar" style="background: rgba(15, 12, 41, 0.95); box-shadow: 0 2px 20px rgba(0,0,0,0.3);">
        <div class="container navbar-content">
            <a href="index.html" class="logo" style="color: #fff;">
                <img src="images/LOGOTT.png" alt="Logo" height="50">
                <span class="logo-text">โรงเรียนทัพทันอนุสรณ์</span>
            </a>
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <span class="bar" style="background: #fff;"></span>
                <span class="bar" style="background: #fff;"></span>
                <span class="bar" style="background: #fff;"></span>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html" style="color: rgba(255,255,255,0.8);">หน้าแรก</a></li>
                <li><a href="curriculum.html" style="color: rgba(255,255,255,0.8);">หลักสูตร</a></li>
            </ul>
        </div>
    </nav>

    <!-- Streak popup -->
    <div class="streak-popup" id="streakPopup"></div>

    <!-- Game Wrapper -->
    <div class="game-wrapper" id="gameWrapper">

        <!-- Start Screen -->
        <div class="start-screen" id="startScreen">
            <h1>🧠 เกมจับคู่เทคโนโลยี</h1>
            <p class="subtitle">บทที่ 2: เทคโนโลยีดิจิทัล</p>
            <div class="start-info">
                <div class="start-info-item">
                    <span>8 คู่</span>
                    การ์ดจับคู่
                </div>
                <div class="start-info-item">
                    <span>🧠</span>
                    ฝึกความจำ
                </div>
                <div class="start-info-item">
                    <span>⚡</span>
                    ท้าทาย!
                </div>
            </div>

            <p style="color: rgba(255,255,255,0.6); margin-bottom: 25px; font-size: 0.95rem;">
                จับคู่ไอคอนกับชื่อเทคโนโลยีดิจิทัลให้ครบทุกคู่!<br>
                ยิ่งใช้จำนวนครั้งน้อย ยิ่งเก่ง! ⏱️
            </p>

            <button class="start-btn" onclick="startGame()">🚀 เริ่มเล่นเกม</button>
        </div>

        <!-- Game Area (hidden initially) -->
        <div id="gameArea" style="display: none;">
            <div class="game-hud">
                <div class="hud-item">
                    <div class="hud-label">ครั้งที่เปิด</div>
                    <div class="hud-value moves-val" id="hudMoves">0</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">จับคู่ได้</div>
                    <div class="hud-value pairs-val" id="hudPairs">0 / 8</div>
                </div>
                <div class="hud-item">
                    <div class="hud-label">เวลา</div>
                    <div class="hud-value timer-val" id="hudTimer">0:00</div>
                </div>
            </div>

            <div class="card-grid" id="cardGrid"></div>
        </div>

        <!-- Result Screen (hidden) -->
        <div class="result-screen" id="resultScreen"></div>
    </div>

    <script>
        // Mobile menu
        const mobileBtn = document.getElementById('mobile-menu-btn');
        const navLinksEl = document.getElementById('nav-links');
        mobileBtn.addEventListener('click', () => {
            navLinksEl.classList.toggle('active');
            mobileBtn.classList.toggle('active');
        });

        // Tech card data: pairs of emoji + Thai label
        const techPairs = [
            { emoji: '🤖', label: 'AI' },
            { emoji: '📱', label: 'IoT' },
            { emoji: '☁️', label: 'Cloud' },
            { emoji: '🔗', label: 'Blockchain' },
            { emoji: '🧠', label: 'Machine Learning' },
            { emoji: '📊', label: 'Big Data' },
            { emoji: '🥽', label: 'AR / VR' },
            { emoji: '🖨️', label: '3D Printing' },
            { emoji: '🛡️', label: 'Cybersecurity' },
            { emoji: '📡', label: '5G' },
            { emoji: '💻', label: 'Programming' },
            { emoji: '🎮', label: 'Game Dev' }
        ];

        // Game State
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let totalPairs = 8;
        let gameTimer;
        let gameSeconds = 0;
        let canFlip = true;
        let consecutiveMatches = 0;

        function shuffleArray(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';

            // Pick 8 random pairs
            const selectedPairs = shuffleArray(techPairs).slice(0, totalPairs);

            // Create cards: each pair produces 2 cards with the same pairId
            let cardData = [];
            selectedPairs.forEach((pair, index) => {
                cardData.push({ ...pair, pairId: index, id: index * 2 });
                cardData.push({ ...pair, pairId: index, id: index * 2 + 1 });
            });

            cards = shuffleArray(cardData);

            renderCards();
            startTimer();
        }

        function renderCards() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';

            cards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'memory-card';
                cardEl.dataset.index = index;
                cardEl.innerHTML = `
                    <div class="card-face card-back">
                        <div class="card-back-icon">❓</div>
                        <div class="card-back-text">TECH</div>
                    </div>
                    <div class="card-face card-front">
                        <div class="card-emoji">${card.emoji}</div>
                        <div class="card-label">${card.label}</div>
                    </div>
                `;
                cardEl.addEventListener('click', () => flipCard(index));
                grid.appendChild(cardEl);
            });
        }

        function flipCard(index) {
            if (!canFlip) return;

            const cardEl = document.querySelectorAll('.memory-card')[index];

            // Don't flip if already flipped or matched
            if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;

            // Don't allow more than 2 flips
            if (flippedCards.length >= 2) return;

            cardEl.classList.add('flipped');
            flippedCards.push(index);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('hudMoves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [idx1, idx2] = flippedCards;
            const card1 = cards[idx1];
            const card2 = cards[idx2];

            const cardEls = document.querySelectorAll('.memory-card');

            if (card1.pairId === card2.pairId) {
                // Match!
                matchedPairs++;
                consecutiveMatches++;
                document.getElementById('hudPairs').textContent = `${matchedPairs} / ${totalPairs}`;

                setTimeout(() => {
                    cardEls[idx1].classList.add('matched');
                    cardEls[idx2].classList.add('matched');
                    createParticles();

                    if (consecutiveMatches >= 2) {
                        showStreak(consecutiveMatches);
                    }

                    if (matchedPairs >= totalPairs) {
                        setTimeout(() => showResult(), 600);
                    }

                    flippedCards = [];
                    canFlip = true;
                }, 400);

            } else {
                // No match
                consecutiveMatches = 0;
                setTimeout(() => {
                    cardEls[idx1].classList.remove('flipped');
                    cardEls[idx2].classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 900);
            }
        }

        function startTimer() {
            gameSeconds = 0;
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                gameSeconds++;
                const mins = Math.floor(gameSeconds / 60);
                const secs = gameSeconds % 60;
                document.getElementById('hudTimer').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

                if (gameSeconds >= 120) {
                    document.getElementById('hudTimer').classList.add('timer-warning');
                }
            }, 1000);
        }

        function showResult() {
            clearInterval(gameTimer);
            document.getElementById('gameArea').style.display = 'none';
            const resultScreen = document.getElementById('resultScreen');

            const mins = Math.floor(gameSeconds / 60);
            const secs = gameSeconds % 60;
            const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;

            // Calculate stars based on moves
            let stars, emoji, title, detail;
            const perfectMoves = totalPairs; // Best possible is 8 moves (one try each pair)

            if (moves <= perfectMoves + 4) {
                stars = 3;
                emoji = '🏆';
                title = 'ยอดเยี่ยม!';
                detail = 'ความจำเป็นเลิศ! คุณเป็นอัจฉริยะด้านเทคโนโลยี!';
            } else if (moves <= perfectMoves + 10) {
                stars = 2;
                emoji = '⭐';
                title = 'ดีมาก!';
                detail = 'ทำได้ดีมากครับ ฝึกอีกนิดจะเป็น Pro!';
            } else if (moves <= perfectMoves + 18) {
                stars = 1;
                emoji = '💪';
                title = 'พยายามดี!';
                detail = 'ลองเล่นอีกรอบ ความจำจะดีขึ้นแน่นอน!';
            } else {
                stars = 0;
                emoji = '🧠';
                title = 'สู้ๆ!';
                detail = 'ฝึกเล่นอีกนิด ศึกษาเนื้อหาเพิ่มเติมแล้วมาแก้ตัวใหม่!';
            }

            const starsDisplay = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);

            resultScreen.innerHTML = `
                <div class="result-emoji">${emoji}</div>
                <div class="result-title">${title}</div>
                <div class="result-score">${starsDisplay}</div>
                <div class="result-detail">${detail}</div>
                <div class="result-stats">
                    <div class="stat-box blue">
                        <div class="stat-num">${moves}</div>
                        <div class="stat-lbl">ครั้งที่เปิด</div>
                    </div>
                    <div class="stat-box green">
                        <div class="stat-num">${matchedPairs}</div>
                        <div class="stat-lbl">จับคู่ได้</div>
                    </div>
                    <div class="stat-box yellow">
                        <div class="stat-num">${timeStr}</div>
                        <div class="stat-lbl">เวลาที่ใช้</div>
                    </div>
                </div>
                <div class="result-actions">
                    <a href="game_chapter2.html" class="btn btn-primary" style="background: linear-gradient(135deg, #4facfe, #00f2fe); color: #0f0c29; font-weight: 700;">🔄 เล่นอีกครั้ง</a>
                    <a href="chapter2.html" class="btn btn-outline" style="border-color: rgba(255,255,255,0.3); color: #fff;">📖 กลับไปทบทวน</a>
                    <a href="curriculum.html" class="btn btn-secondary">📚 กลับสู่หลักสูตร</a>
                </div>
            `;

            resultScreen.classList.add('show');

            if (stars >= 2) {
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => createParticles(), i * 100);
                }
            }
        }

        function showStreak(count) {
            const popup = document.getElementById('streakPopup');
            popup.textContent = `🔥 ${count} Combo!`;
            popup.className = 'streak-popup show';
            setTimeout(() => {
                popup.className = 'streak-popup';
            }, 1200);
        }

        function createParticles() {
            const emojis = ['⭐', '🌟', '✨', '💫', '🎉', '🎊', '🤖', '📱', '☁️', '🔗', '🧠'];
            for (let i = 0; i < 5; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                particle.style.left = Math.random() * window.innerWidth + 'px';
                particle.style.top = (Math.random() * window.innerHeight * 0.6 + window.innerHeight * 0.2) + 'px';
                particle.style.fontSize = (Math.random() * 20 + 15) + 'px';
                particle.style.animation = `confetti ${Math.random() * 0.5 + 0.8}s ease forwards`;
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1500);
            }
        }
    </script>

</body>

</html>
